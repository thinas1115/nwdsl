<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>nwdsl playground</title>
<style>
  :root {
    --bg: #f1f4f9; --panel: #ffffff; --line: #e3e8ef;
    --ink: #1e293b; --muted: #64748b; --faint: #94a3b8;
    --brand: #2563eb; --brand-dark: #1d4ed8; --brand-soft: #eff4ff;
    --navy1: #0d1b34; --navy2: #16294d;
    --ok: #0f8a3d; --ng: #d43a2f;
    --mono: "Cascadia Code", Consolas, "BIZ UDGothic", monospace;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(15,27,52,.06), 0 8px 24px rgba(15,27,52,.07);
  }
  * { box-sizing: border-box; }
  body { margin: 0; color: var(--ink); background: var(--bg);
         font-family: "Segoe UI", "Hiragino Sans", "Noto Sans JP", Meiryo, sans-serif;
         display: flex; flex-direction: column; height: 100vh; }
  button { font-family: inherit; }

  /* ---- ヘッダー ---- */
  header { display: flex; align-items: center; gap: 14px; padding: 10px 20px; flex-wrap: wrap;
           background: linear-gradient(90deg, var(--navy1), var(--navy2)); color: #fff; }
  header h1 { font-size: 16px; margin: 0; letter-spacing: .3px; font-weight: 600; }
  header h1 .accent { color: #7fb0ff; }
  header .tagline { font-size: 11.5px; color: #8fa3c4; }
  header label { font-size: 12px; color: #c6d2e4; display: flex; align-items: center; gap: 6px; }
  header select { background: rgba(255,255,255,.08); color: #fff; font-size: 12.5px;
                  border: 1px solid rgba(255,255,255,.22); border-radius: 7px; padding: 5px 8px; }
  header select option { color: #1e293b; }
  .btn { border-radius: 7px; padding: 6px 14px; font-size: 12.5px; cursor: pointer;
         border: 1px solid transparent; transition: background .12s, border-color .12s; }
  .btn-primary { background: var(--brand); color: #fff; font-weight: 600; }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-ghost { background: transparent; color: #dbe6f6; border-color: rgba(255,255,255,.25); }
  .btn-ghost:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.45); }
  header .links { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }

  /* ---- 2ペインレイアウト ---- */
  main { flex: 1; display: flex; min-height: 0; gap: 14px; padding: 14px 16px 16px; }
  #editor-pane, #preview-pane { display: flex; flex-direction: column; min-height: 0;
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden; }
  #editor-pane { width: 40%; min-width: 340px; }
  #preview-pane { flex: 1; min-width: 0; }
  .pane-bar { display: flex; gap: 10px; align-items: center; padding: 8px 14px;
              border-bottom: 1px solid var(--line); background: #fafbfd; flex-wrap: wrap; }
  .pane-bar .hint { font-size: 11.5px; color: var(--faint); }
  #yaml { flex: 1; border: none; resize: none; padding: 14px 16px; font-size: 13px;
          line-height: 1.6; font-family: var(--mono); outline: none; color: #0f2038;
          tab-size: 2; }

  /* ---- タブ・ステータス ---- */
  .tabs { display: flex; background: #eaeef5; border-radius: 8px; padding: 3px; gap: 2px; }
  .tab { border: none; background: transparent; border-radius: 6px; padding: 4px 14px;
         font-size: 12.5px; color: var(--muted); cursor: pointer; }
  .tab:hover { color: var(--ink); }
  .tab.active { background: #fff; color: var(--brand-dark); font-weight: 600;
                box-shadow: 0 1px 2px rgba(15,27,52,.12); }
  #view-select { font-size: 12.5px; padding: 5px 8px; border: 1px solid var(--line);
                 border-radius: 7px; color: var(--ink); background: #fff; max-width: 230px; }
  .zoom-wrap { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--muted); }
  #zoom { width: 90px; accent-color: var(--brand); }
  #status { margin-left: auto; font-size: 12px; font-weight: 600; border-radius: 99px;
            padding: 3px 12px; }
  #status.ok { color: var(--ok); background: #e8f6ed; }
  #status.ng { color: var(--ng); background: #fdebe9; }

  /* ---- プレビュー本体 ---- */
  #output { flex: 1; overflow: auto; background: #fff; padding: 16px 18px; }
  #output svg { max-width: none; }
  #output > pre { background: #0d1b34; color: #d7e3f4; border-radius: 8px; padding: 14px 16px;
                  font-family: var(--mono); font-size: 12.5px; line-height: 1.55;
                  white-space: pre-wrap; }
  .issue { padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 13px;
           border: 1px solid transparent; }
  .issue.error { background: #fdebe9; color: #9c2318; border-color: #f5c6c0; }
  .issue.warning { background: #fff7e0; color: #7a5d00; border-color: #f1e2ac; }

  /* ---- Markdown 本文 (表タブ / Docs 共通) ---- */
  .md-body { max-width: 900px; line-height: 1.8; font-size: 14.5px; }
  .md-body h1 { font-size: 25px; padding-bottom: 10px; border-bottom: 1px solid var(--line);
                margin: 4px 0 18px; }
  .md-body h2 { font-size: 19px; margin: 34px 0 12px; padding-left: 10px;
                border-left: 4px solid var(--brand); }
  .md-body h3 { font-size: 15.5px; margin: 24px 0 8px; }
  .md-body p, .md-body li { color: #334155; }
  .md-body a { color: var(--brand); }
  .md-body code { background: #edf1f7; border-radius: 5px; padding: 1.5px 6px;
                  font-family: var(--mono); font-size: .88em; color: #0f3060; }
  .md-body pre { background: #0d1b34; border-radius: 8px; padding: 14px 16px; overflow-x: auto; }
  .md-body pre code { background: none; padding: 0; color: #d7e3f4; font-size: 12.5px;
                      line-height: 1.6; }
  .md-body table { border-collapse: collapse; margin: 14px 0; font-size: 13.5px; width: 100%; }
  .md-body th { background: #f4f7fb; text-align: left; }
  .md-body th, .md-body td { border: 1px solid var(--line); padding: 7px 12px; }
  .md-body tr:nth-child(even) td { background: #fafcfe; }
  .md-body blockquote { margin: 14px 0; padding: 10px 16px; background: var(--brand-soft);
                        border-left: 4px solid var(--brand); border-radius: 0 8px 8px 0;
                        color: #1e3a6e; }
  .md-body blockquote p { margin: 4px 0; color: inherit; }
  .md-body hr { border: none; border-top: 1px solid var(--line); margin: 28px 0; }
  .md-body pre.raw { white-space: pre-wrap; color: #d7e3f4; }

  /* ---- Docs ビューア ---- */
  #docs-overlay { position: fixed; inset: 0; background: rgba(9,17,34,.6); display: none;
                  backdrop-filter: blur(2px); }
  #docs-panel { position: absolute; top: 3.5%; left: 7%; right: 7%; bottom: 3.5%;
                background: #fff; border-radius: 14px; display: flex; overflow: hidden;
                box-shadow: 0 24px 80px rgba(9,17,34,.45); }
  #docs-nav { width: 270px; border-right: 1px solid var(--line); overflow-y: auto;
              padding: 18px 14px; background: #f7f9fd; flex-shrink: 0; }
  #docs-nav h3 { font-size: 11px; color: var(--faint); margin: 18px 6px 6px;
                 text-transform: uppercase; letter-spacing: .8px; }
  #docs-nav h3:first-child { margin-top: 2px; }
  #docs-nav a { display: block; font-size: 13.5px; padding: 7px 10px; color: #33445c;
                text-decoration: none; border-radius: 7px; cursor: pointer; margin-bottom: 1px; }
  #docs-nav a:hover { background: #e9eef8; }
  #docs-nav a.active { background: var(--brand-soft); color: var(--brand-dark); font-weight: 600; }
  #docs-body { flex: 1; overflow-y: auto; padding: 30px 44px 60px; }
  #docs-close { position: absolute; top: 12px; right: 14px; font-size: 15px; cursor: pointer;
                background: #f1f4f9; border: 1px solid var(--line); border-radius: 99px;
                width: 32px; height: 32px; color: var(--muted); }
  #docs-close:hover { background: #e3e8ef; color: var(--ink); }
</style>
</head>
<body>
<header>
  <div>
    <h1><span class="accent">nw</span>dsl playground</h1>
    <div class="tagline">ネットワーク構成DSL — YAMLを書くと構成図・表が生成されます</div>
  </div>
  <label>サンプル
    <select id="sample-select"></select>
  </label>
  <button id="render-btn" class="btn btn-primary">検証 + 描画</button>
  <span class="links">
    <button class="btn btn-ghost" data-doc="tutorial.md">チュートリアル</button>
    <button class="btn btn-ghost" data-doc="reference.md">リファレンス</button>
    <button class="btn btn-ghost" data-doc="openspec-integration.md">OpenSpec統合</button>
    <button class="btn btn-ghost" data-doc="">Docs一覧</button>
  </span>
</header>
<main>
  <div id="editor-pane">
    <div class="pane-bar">
      <strong style="font-size:12.5px">network.yaml</strong>
      <span class="hint">編集すると自動で検証+再描画 (Ctrl+Enter で即時)</span>
    </div>
    <textarea id="yaml" spellcheck="false"></textarea>
  </div>
  <div id="preview-pane">
    <div class="pane-bar">
      <div class="tabs">
        <button class="tab active" data-tab="diagram">図</button>
        <button class="tab" data-tab="tables">表</button>
        <button class="tab" data-tab="d2">D2ソース</button>
        <button class="tab" data-tab="mermaid">Mermaid</button>
      </div>
      <select id="view-select" title="ビュー切替"></select>
      <span class="zoom-wrap">拡大
        <input type="range" id="zoom" min="30" max="200" value="100">
      </span>
      <span id="status"></span>
    </div>
    <div id="output"></div>
  </div>
</main>
<div id="docs-overlay">
  <div id="docs-panel">
    <nav id="docs-nav"></nav>
    <div id="docs-body" class="md-body"></div>
    <button id="docs-close" title="閉じる">✕</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
let last = null;          // 直近の /api/render 結果
let currentTab = "diagram";
let timer = null;

async function api(path, opts) {
  const res = await fetch(path, opts);
  return res.json();
}

function setStatus(text, ok) {
  const el = $("status");
  el.textContent = text;
  el.className = ok ? "ok" : "ng";
}

function esc(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;");
}

function issuesHtml(r) {
  let html = "";
  for (const e of r.errors || []) html += `<div class="issue error">${esc(e)}</div>`;
  for (const i of r.issues || [])
    html += `<div class="issue ${i.level}">[${i.level.toUpperCase()}] ${esc(i.code)}: ${esc(i.message)}</div>`;
  return html;
}

function mdToHtml(md) {
  if (window.marked) return marked.parse(md);
  return `<pre class="raw">${esc(md)}</pre>`;
}

function show() {
  const out = $("output");
  if (!last) { out.innerHTML = ""; return; }
  const warn = issuesHtml(last);
  if (!last.ok || (last.issues || []).some((i) => i.level === "error")) {
    out.innerHTML = warn || "<p>エラー</p>";
    return;
  }
  if (currentTab === "diagram") {
    if (last.svg) {
      out.innerHTML = warn + `<div id="svg-box">${last.svg}</div>`;
      fitZoom();
      applyZoom();
    } else {
      out.innerHTML = warn + (last.d2_available
        ? "<p>描画結果がありません</p>"
        : "<p>D2 バイナリが見つからないため SVG プレビューは無効です。「D2ソース」タブの内容を d2 CLI で描画してください。</p>");
    }
  } else if (currentTab === "tables") {
    out.innerHTML = warn + `<div class="md-body">${mdToHtml(last.tables || "")}</div>`;
  } else if (currentTab === "d2") {
    out.innerHTML = `<pre>${esc(last.d2 || "")}</pre>`;
  } else if (currentTab === "mermaid") {
    out.innerHTML = `<pre>${esc(last.mermaid || "")}</pre>`;
  }
}

function fitZoom() {
  // 描画のたびに図全体が収まる倍率へ自動フィット (縦横の両方を考慮)
  const svg = document.querySelector("#svg-box svg");
  if (!svg || !svg.width || !svg.width.baseVal) return;
  const w = svg.width.baseVal.value, h = svg.height.baseVal.value;
  const availW = $("output").clientWidth - 30;
  const availH = $("output").clientHeight - 40;
  if (w > 0 && h > 0) {
    const scale = Math.min(availW / w, availH / h, 1);
    $("zoom").value = Math.max(30, Math.floor(scale * 100));
  }
}

function applyZoom() {
  const box = document.querySelector("#svg-box svg");
  if (box) {
    const scale = $("zoom").value / 100;
    box.style.transformOrigin = "top left";
    box.style.transform = `scale(${scale})`;
  }
}

async function render() {
  const body = { yaml: $("yaml").value, view: $("view-select").value || null };
  setStatus("描画中…", true);
  try {
    last = await api("/api/render", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body) });
  } catch (e) {
    setStatus("サーバーに接続できません", false);
    return;
  }
  const sel = $("view-select");
  const prev = last.view || sel.value;
  sel.innerHTML = (last.views || [])
    .map((v) => `<option value="${v.id}" ${v.id === prev ? "selected" : ""}>${esc(v.title)}</option>`)
    .join("");
  const errs = (last.errors || []).length +
    (last.issues || []).filter((i) => i.level === "error").length;
  const warns = (last.issues || []).filter((i) => i.level === "warning").length;
  setStatus(errs ? `NG: エラー${errs}件` : `OK (警告${warns}件)`, !errs);
  show();
}

function scheduleRender() {
  clearTimeout(timer);
  timer = setTimeout(render, 900);
}

async function loadSample(name) {
  const r = await api(`/api/sample?name=${encodeURIComponent(name)}`);
  $("yaml").value = r.yaml;
  $("view-select").innerHTML = "";
  render();
}

async function openDocs(name) {
  const overlay = $("docs-overlay");
  overlay.style.display = "block";
  const list = (await api("/api/docs")).docs;
  const nav = $("docs-nav");
  const top = list.filter((d) => !d.name.startsWith("adr/"));
  const adr = list.filter((d) => d.name.startsWith("adr/"));
  nav.innerHTML = "<h3>ガイド</h3>" +
    top.map((d) => `<a data-name="${d.name}">${esc(d.title)}</a>`).join("") +
    "<h3>設計判断記録 (ADR)</h3>" +
    adr.map((d) => `<a data-name="${d.name}">${esc(d.title)}</a>`).join("");
  nav.querySelectorAll("a").forEach((a) =>
    a.addEventListener("click", () => showDoc(a.dataset.name)));
  showDoc(name || (list[0] && list[0].name));
}

async function showDoc(name) {
  if (!name) { $("docs-body").innerHTML = "<p>docs/ が見つかりません</p>"; return; }
  document.querySelectorAll("#docs-nav a").forEach((a) =>
    a.classList.toggle("active", a.dataset.name === name));
  const r = await api(`/api/doc?name=${encodeURIComponent(name)}`);
  $("docs-body").innerHTML = r.markdown ? mdToHtml(r.markdown) : `<p>${esc(r.error || "")}</p>`;
  $("docs-body").scrollTop = 0;
}

// ---- イベント配線 ----
$("render-btn").addEventListener("click", render);
$("yaml").addEventListener("input", scheduleRender);
$("yaml").addEventListener("keydown", (e) => {
  if (e.ctrlKey && e.key === "Enter") { e.preventDefault(); render(); }
});
$("view-select").addEventListener("change", render);
$("zoom").addEventListener("input", applyZoom);
document.querySelectorAll(".tab").forEach((t) =>
  t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
    t.classList.add("active");
    currentTab = t.dataset.tab;
    show();
  }));
document.querySelectorAll("header [data-doc]").forEach((b) =>
  b.addEventListener("click", () => openDocs(b.dataset.doc)));
$("docs-close").addEventListener("click", () => { $("docs-overlay").style.display = "none"; });
$("docs-overlay").addEventListener("click", (e) => {
  if (e.target === $("docs-overlay")) $("docs-overlay").style.display = "none";
});
$("sample-select").addEventListener("change", (e) => loadSample(e.target.value));

(async () => {
  const names = (await api("/api/samples")).samples;
  $("sample-select").innerHTML =
    names.map((n) => `<option value="${n}">${n}</option>`).join("");
  loadSample(names[0] || "minimal");
  // ?doc=tutorial.md でDocsビューアを直接開ける (共有リンク用)
  const q = new URLSearchParams(location.search);
  if (q.has("doc")) openDocs(q.get("doc") || undefined);
})();
</script>
</body>
</html>
