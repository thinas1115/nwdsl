<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>nwdsl playground</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Segoe UI", "Hiragino Sans", Meiryo, sans-serif;
         display: flex; flex-direction: column; height: 100vh; background: #f7f9fc; }
  header { display: flex; align-items: center; gap: 16px; padding: 8px 16px;
           background: #1a2340; color: #fff; flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0; }
  header .links { display: flex; gap: 4px; flex-wrap: wrap; }
  header button, header select {
    background: #33475b; color: #fff; border: 1px solid #5b7fa6; border-radius: 4px;
    padding: 4px 10px; font-size: 12px; cursor: pointer; }
  header button:hover { background: #4a6076; }
  main { flex: 1; display: flex; min-height: 0; }
  #editor-pane { width: 40%; min-width: 320px; display: flex; flex-direction: column;
                 border-right: 1px solid #d5dce5; }
  #editor-toolbar { display: flex; gap: 8px; align-items: center; padding: 6px 10px;
                    background: #eef2f7; border-bottom: 1px solid #d5dce5; font-size: 12px; }
  #yaml { flex: 1; border: none; resize: none; padding: 10px; font-size: 13px; line-height: 1.5;
          font-family: Consolas, "BIZ UDGothic", monospace; outline: none; }
  #preview-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #preview-toolbar { display: flex; gap: 6px; align-items: center; padding: 6px 10px;
                     background: #eef2f7; border-bottom: 1px solid #d5dce5; flex-wrap: wrap; }
  .tab { border: 1px solid #c3ccd6; background: #fff; border-radius: 4px; padding: 3px 12px;
         font-size: 12px; cursor: pointer; }
  .tab.active { background: #1a56b0; color: #fff; border-color: #1a56b0; }
  #view-select { font-size: 12px; padding: 3px; }
  #status { margin-left: auto; font-size: 12px; }
  #status.ok { color: #137333; } #status.ng { color: #c5221f; }
  #output { flex: 1; overflow: auto; background: #fff; padding: 12px; }
  #output svg { max-width: none; }
  #output pre { font-family: Consolas, monospace; font-size: 12px; white-space: pre-wrap; }
  #output table { border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
  #output th, #output td { border: 1px solid #c3ccd6; padding: 4px 10px; text-align: left; }
  #output th { background: #eef2f7; }
  .issue { padding: 6px 10px; border-radius: 4px; margin-bottom: 6px; font-size: 13px; }
  .issue.error { background: #fce8e6; color: #a50e0e; }
  .issue.warning { background: #fff8e1; color: #7a5d00; }
  #docs-overlay { position: fixed; inset: 0; background: rgba(20,30,50,.55); display: none; }
  #docs-panel { position: absolute; top: 4%; left: 8%; right: 8%; bottom: 4%; background: #fff;
                border-radius: 8px; display: flex; overflow: hidden; }
  #docs-nav { width: 240px; border-right: 1px solid #d5dce5; overflow-y: auto; padding: 12px;
              background: #f7f9fc; }
  #docs-nav h3 { font-size: 12px; color: #5f6368; margin: 10px 0 4px; }
  #docs-nav a { display: block; font-size: 13px; padding: 3px 6px; color: #1a56b0;
                text-decoration: none; border-radius: 4px; cursor: pointer; }
  #docs-nav a:hover { background: #e8f0fe; }
  #docs-body { flex: 1; overflow-y: auto; padding: 20px 32px; }
  #docs-body pre.raw { white-space: pre-wrap; font-size: 13px; }
  #docs-body table { border-collapse: collapse; }
  #docs-body th, #docs-body td { border: 1px solid #c3ccd6; padding: 4px 8px; font-size: 13px; }
  #docs-close { position: absolute; top: 10px; right: 16px; font-size: 20px; cursor: pointer;
                background: none; border: none; color: #5f6368; }
  #zoom { width: 90px; }
</style>
</head>
<body>
<header>
  <h1>nwdsl playground</h1>
  <label style="font-size:12px">サンプル:
    <select id="sample-select"></select>
  </label>
  <button id="render-btn">検証 + 描画 (Ctrl+Enter)</button>
  <span class="links">
    <button data-doc="tutorial.md">チュートリアル</button>
    <button data-doc="reference.md">リファレンス</button>
    <button data-doc="openspec-integration.md">OpenSpec統合</button>
    <button data-doc="">Docs一覧</button>
  </span>
</header>
<main>
  <div id="editor-pane">
    <div id="editor-toolbar">network.yaml を編集すると自動で再描画されます</div>
    <textarea id="yaml" spellcheck="false"></textarea>
  </div>
  <div id="preview-pane">
    <div id="preview-toolbar">
      <span class="tab active" data-tab="diagram">図</span>
      <span class="tab" data-tab="tables">表</span>
      <span class="tab" data-tab="d2">D2ソース</span>
      <span class="tab" data-tab="mermaid">Mermaid</span>
      <label style="font-size:12px">ビュー: <select id="view-select"></select></label>
      <label style="font-size:12px">拡大 <input type="range" id="zoom" min="30" max="200" value="100"></label>
      <span id="status"></span>
    </div>
    <div id="output"></div>
  </div>
</main>
<div id="docs-overlay">
  <div id="docs-panel">
    <nav id="docs-nav"></nav>
    <div id="docs-body"></div>
    <button id="docs-close">✕</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
let last = null;          // 直近の /api/render 結果
let currentTab = "diagram";
let timer = null;

async function api(path, opts) {
  const res = await fetch(path, opts);
  return res.json();
}

function setStatus(text, ok) {
  const el = $("status");
  el.textContent = text;
  el.className = ok ? "ok" : "ng";
}

function esc(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;");
}

function issuesHtml(r) {
  let html = "";
  for (const e of r.errors || []) html += `<div class="issue error">${esc(e)}</div>`;
  for (const i of r.issues || [])
    html += `<div class="issue ${i.level}">[${i.level.toUpperCase()}] ${esc(i.code)}: ${esc(i.message)}</div>`;
  return html;
}

function mdToHtml(md) {
  if (window.marked) return marked.parse(md);
  return `<pre class="raw">${esc(md)}</pre>`;
}

function show() {
  const out = $("output");
  if (!last) { out.innerHTML = ""; return; }
  const warn = issuesHtml(last);
  if (!last.ok || (last.issues || []).some((i) => i.level === "error")) {
    out.innerHTML = warn || "<p>エラー</p>";
    return;
  }
  if (currentTab === "diagram") {
    if (last.svg) {
      out.innerHTML = warn + `<div id="svg-box">${last.svg}</div>`;
      fitZoom();
      applyZoom();
    } else {
      out.innerHTML = warn + (last.d2_available
        ? "<p>描画結果がありません</p>"
        : "<p>D2 バイナリが見つからないため SVG プレビューは無効です。「D2ソース」タブの内容を d2 CLI で描画してください。</p>");
    }
  } else if (currentTab === "tables") {
    out.innerHTML = warn + mdToHtml(last.tables || "");
  } else if (currentTab === "d2") {
    out.innerHTML = `<pre>${esc(last.d2 || "")}</pre>`;
  } else if (currentTab === "mermaid") {
    out.innerHTML = `<pre>${esc(last.mermaid || "")}</pre>`;
  }
}

function fitZoom() {
  // 描画のたびに図全体が収まる倍率へ自動フィット (縦横の両方を考慮)
  const svg = document.querySelector("#svg-box svg");
  if (!svg || !svg.width || !svg.width.baseVal) return;
  const w = svg.width.baseVal.value, h = svg.height.baseVal.value;
  const availW = $("output").clientWidth - 30;
  const availH = $("output").clientHeight - 40;
  if (w > 0 && h > 0) {
    const scale = Math.min(availW / w, availH / h, 1);
    $("zoom").value = Math.max(30, Math.floor(scale * 100));
  }
}

function applyZoom() {
  const box = document.querySelector("#svg-box svg");
  if (box) {
    const scale = $("zoom").value / 100;
    box.style.transformOrigin = "top left";
    box.style.transform = `scale(${scale})`;
  }
}

async function render() {
  const body = { yaml: $("yaml").value, view: $("view-select").value || null };
  setStatus("描画中…", true);
  try {
    last = await api("/api/render", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body) });
  } catch (e) {
    setStatus("サーバーに接続できません", false);
    return;
  }
  const sel = $("view-select");
  const prev = last.view || sel.value;
  sel.innerHTML = (last.views || [])
    .map((v) => `<option value="${v.id}" ${v.id === prev ? "selected" : ""}>${esc(v.title)}</option>`)
    .join("");
  const errs = (last.errors || []).length +
    (last.issues || []).filter((i) => i.level === "error").length;
  const warns = (last.issues || []).filter((i) => i.level === "warning").length;
  setStatus(errs ? `NG: エラー${errs}件` : `OK (警告${warns}件)`, !errs);
  show();
}

function scheduleRender() {
  clearTimeout(timer);
  timer = setTimeout(render, 900);
}

async function loadSample(name) {
  const r = await api(`/api/sample?name=${encodeURIComponent(name)}`);
  $("yaml").value = r.yaml;
  $("view-select").innerHTML = "";
  render();
}

async function openDocs(name) {
  const overlay = $("docs-overlay");
  overlay.style.display = "block";
  const list = (await api("/api/docs")).docs;
  const nav = $("docs-nav");
  const top = list.filter((d) => !d.name.startsWith("adr/"));
  const adr = list.filter((d) => d.name.startsWith("adr/"));
  nav.innerHTML = "<h3>ガイド</h3>" +
    top.map((d) => `<a data-name="${d.name}">${esc(d.title)}</a>`).join("") +
    "<h3>設計判断記録 (ADR)</h3>" +
    adr.map((d) => `<a data-name="${d.name}">${esc(d.title)}</a>`).join("");
  nav.querySelectorAll("a").forEach((a) =>
    a.addEventListener("click", () => showDoc(a.dataset.name)));
  showDoc(name || (list[0] && list[0].name));
}

async function showDoc(name) {
  if (!name) { $("docs-body").innerHTML = "<p>docs/ が見つかりません</p>"; return; }
  const r = await api(`/api/doc?name=${encodeURIComponent(name)}`);
  $("docs-body").innerHTML = r.markdown ? mdToHtml(r.markdown) : `<p>${esc(r.error || "")}</p>`;
  $("docs-body").scrollTop = 0;
}

// ---- イベント配線 ----
$("render-btn").addEventListener("click", render);
$("yaml").addEventListener("input", scheduleRender);
$("yaml").addEventListener("keydown", (e) => {
  if (e.ctrlKey && e.key === "Enter") { e.preventDefault(); render(); }
});
$("view-select").addEventListener("change", render);
$("zoom").addEventListener("input", applyZoom);
document.querySelectorAll(".tab").forEach((t) =>
  t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
    t.classList.add("active");
    currentTab = t.dataset.tab;
    show();
  }));
document.querySelectorAll("header [data-doc]").forEach((b) =>
  b.addEventListener("click", () => openDocs(b.dataset.doc)));
$("docs-close").addEventListener("click", () => { $("docs-overlay").style.display = "none"; });
$("docs-overlay").addEventListener("click", (e) => {
  if (e.target === $("docs-overlay")) $("docs-overlay").style.display = "none";
});
$("sample-select").addEventListener("change", (e) => loadSample(e.target.value));

(async () => {
  const names = (await api("/api/samples")).samples;
  $("sample-select").innerHTML =
    names.map((n) => `<option value="${n}">${n}</option>`).join("");
  loadSample(names[0] || "minimal");
})();
</script>
</body>
</html>
